services:
  pipeline:
    build: .
    command: ["pipeline", "run"]
    ports:
      - "8765:8765"
    environment:
      DEVIN_API_KEY: ${DEVIN_API_KEY:-}
      DEVIN_ORG_ID: ${DEVIN_ORG_ID:-}
      TARGET_REPO: ${TARGET_REPO:-cognition-demo/superset}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    volumes:
      - pipeline-data:/app/data

volumes:
  pipeline-data:
